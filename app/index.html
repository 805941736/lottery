<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="/app/">
  <title>双色球分析标注 正式版 v3.0</title>
  <link rel="stylesheet" href="./assets/styles/index.css">
</head>
<body>
  <main class="app">
    <section class="toolbar" aria-label="标注工具栏">
      <div class="brand"><span class="brand-mark">SSQ</span><span>双色球分析标注</span><span class="version-badge" id="versionBadge">v3.0</span></div>
      <div class="group" role="group" aria-label="图表来源">
        <a class="action-button primary-link" href="https://datachart.500.com/ssq/" target="_blank" rel="noopener" title="打开500彩票网双色球图表"><svg class="icon" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><path d="M15 3h6v6"></path><path d="M10 14L21 3"></path></svg>打开源站</a>
        <button class="action-button" type="button" id="refreshChartButton" title="重新载入本地图表数据"><svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15.5 6.2"></path><path d="M3 12A9 9 0 0 1 18.5 5.8"></path><path d="M18 2v4h-4"></path><path d="M6 22v-4h4"></path></svg>刷新图表</button>
      </div>
      <div class="group" role="group" aria-label="绘图工具">
        <button class="tool-button active" type="button" data-tool="hand" title="手型选择"><svg class="icon" viewBox="0 0 24 24"><path d="M18 11.5V10a2 2 0 0 0-4 0V9a2 2 0 0 0-4 0v1"></path><path d="M10 10V5a2 2 0 0 0-4 0v8"></path><path d="M6 13l-1.2-1.2a2 2 0 0 0-2.8 2.8l5.5 5.5A6.5 6.5 0 0 0 12.1 22H14a6 6 0 0 0 6-6v-4.5a2 2 0 0 0-4 0"></path></svg></button>
        <button class="tool-button" type="button" data-tool="pen" title="自由画线"><svg class="icon" viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3 1 1-4z"></path><path d="M18 13l-7-7"></path><path d="M2 22l7-2"></path></svg></button>
        <button class="tool-button" type="button" data-tool="line" title="直线"><svg class="icon" viewBox="0 0 24 24"><path d="M5 19L19 5"></path></svg></button>
        <button class="tool-button" type="button" data-tool="arrow" title="箭头"><svg class="icon" viewBox="0 0 24 24"><path d="M5 19L19 5"></path><path d="M11 5h8v8"></path></svg></button>
        <button class="tool-button" type="button" data-tool="rect" title="矩形"><svg class="icon" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"></rect></svg></button>
        <button class="tool-button" type="button" data-tool="ellipse" title="圆圈"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"></circle></svg></button>
        <button class="tool-button" type="button" data-tool="text" title="文字"><svg class="icon" viewBox="0 0 24 24"><path d="M4 7V4h16v3"></path><path d="M9 20h6"></path><path d="M12 4v16"></path></svg></button>
      </div>
      <div class="group" role="group" aria-label="标注颜色">
        <button class="swatch-button active" type="button" data-color="#79aee8" style="--swatch:#79aee8" title="马卡龙蓝"></button>
        <button class="swatch-button" type="button" data-color="#8fd5a4" style="--swatch:#8fd5a4" title="马卡龙绿"></button>
        <button class="swatch-button" type="button" data-color="#f3d36b" style="--swatch:#f3d36b" title="马卡龙黄"></button>
      </div>
      <div class="group" role="group" aria-label="操作">
        <button class="action-button" type="button" id="toggleButton" title="隐藏或显示标注"><svg class="icon" viewBox="0 0 24 24"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"></path><circle cx="12" cy="12" r="3"></circle></svg><span id="toggleText">隐藏</span></button>
        <button class="action-button" type="button" id="exportButton" title="导出图表和标注PNG"><svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path></svg>导出</button>
      </div>
      <div class="latest-panel"><span class="latest-label">最新</span><span class="issue" id="latestIssue">加载中</span><span class="balls" id="latestBalls"></span><button class="action-button refresh-latest" type="button" id="refreshLatestButton" title="刷新顶部最新开奖"><svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15.5 6.2"></path><path d="M3 12A9 9 0 0 1 18.5 5.8"></path><path d="M18 2v4h-4"></path><path d="M6 22v-4h4"></path></svg></button></div>
      <div class="status" id="statusText">自动保存已开启</div>
    </section>
    <section class="workspace" id="workspace">
      <div class="chart-surface" id="chartSurface">
        <div class="chart-title">双色球红蓝走势图 <span class="chart-meta" id="chartMeta"></span></div>
        <div id="chartHost"></div>
        <section class="prediction-panel" id="predictionPanel" aria-label="预测区"></section>
        <canvas class="canvas-layer hand-mode" id="drawCanvas" aria-label="标注绘图层"></canvas>
        <input class="hidden-input" id="recordInput" type="file" accept="application/json,.json">
      </div>
    </section>
  </main>
  <script src="../data/latest-ssq.js"></script>
  <script src="../data/chart-data.js"></script>
  <script src="../data/backtest-predictions.js"></script>
  <script src="./core/ssq-core.js"></script>
  <script src="./core/annotation-geometry.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
