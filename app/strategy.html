<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>双色球策略库</title>
  <style>
    :root { --bg:#f5f6f8; --panel:#fff; --text:#1f2937; --muted:#6b7280; --line:#d7dce3; --red:#d77777; --blue:#45a8db; --accent:#155eef; --accent-soft:#edf4ff; font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--text); background: var(--bg); }
    button, input { font: inherit; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 18px; background:var(--panel); border-bottom:1px solid var(--line); box-shadow:0 8px 22px rgba(31,41,55,.08); }
    .brand { display:flex; align-items:center; gap:10px; font-weight:700; }
    .mark { display:inline-grid; place-items:center; width:34px; height:34px; color:#fff; border-radius:50%; background:linear-gradient(135deg,#d77777,#45a8db); }
    .nav { display:flex; flex-wrap:wrap; gap:8px; }
    .link, .button { display:inline-flex; align-items:center; justify-content:center; min-height:32px; padding:0 10px; border:1px solid #cbd5e1; border-radius:7px; color:var(--text); background:#fff; text-decoration:none; cursor:pointer; }
    .button.primary { border-color:#b8cdfb; color:var(--accent); background:var(--accent-soft); }
    .layout { width:min(1180px, calc(100vw - 32px)); margin:18px auto 36px; display:grid; gap:12px; }
    .panel { border:1px solid var(--line); border-radius:8px; background:var(--panel); padding:12px; }
    h1, h2, h3 { margin:0 0 10px; }
    h1, h2 { font-size:16px; }
    h3 { font-size:13px; }
    .grid { display:grid; grid-template-columns:minmax(320px,.75fr) minmax(420px,1fr); gap:12px; align-items:start; }
    .controls { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .strategy { position:relative; display:inline-flex; align-items:center; justify-content:center; width:74px; height:32px; padding:0 8px; border:1px solid #d7dce3; border-radius:7px; color:#1f2937; background:#fff; font-weight:700; font-size:13px; white-space:nowrap; cursor:pointer; transition:border-color .15s ease, background .15s ease, color .15s ease, box-shadow .15s ease; }
    .strategy.selected { border-color:#155eef; background:#155eef; color:#fff; box-shadow:0 2px 8px rgba(21,94,239,.22); }

    .strategy h3 { margin:0; padding:0; font-size:13px; line-height:1; }
    .strategy h3:hover, .strategy h3:focus { outline:0; }
    .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .toolbar label { display:inline-flex; align-items:center; gap:6px; color:#374151; font-size:13px; }
    .small-input { width:76px; min-height:32px; border:1px solid #cbd5e1; border-radius:7px; padding:4px 7px; }
    .result { display:grid; gap:10px; }
    .pick { display:flex; flex-wrap:wrap; gap:4px; min-height:28px; }
    .ball { display:inline-grid; place-items:center; width:24px; height:24px; border-radius:50%; color:#fff; font-size:12px; font-weight:700; font-variant-numeric:tabular-nums; }
    .ball.red { background:var(--red); }
    .ball.blue { background:var(--blue); }
    .score-grid { display:grid; grid-template-columns:repeat(2, minmax(220px,1fr)); gap:8px; }
    .score-list { border:1px solid #e5e7eb; border-radius:7px; background:#f8fafc; padding:8px; }
    .score-line { display:grid; grid-template-columns:38px 1fr 48px; gap:8px; align-items:center; margin:5px 0; font-size:12px; }
    .bar { height:8px; border-radius:99px; background:#dbe4ef; overflow:hidden; }
    .fill { height:100%; background:#155eef; }
    .note { color:var(--muted); font-size:13px; line-height:1.55; }
    @media (max-width: 900px) { .grid, .score-grid { grid-template-columns:1fr; } .topbar { align-items:flex-start; flex-direction:column; } }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="mark">SSQ</span><span>策略库</span></div>
    <nav class="nav" aria-label="功能导航">
      <a class="link" href="./index.html">分析页</a>
      <a class="link" href="./prediction.html">预测区</a>
      <a class="link" href="./backtest.html">回测区</a>
    </nav>
  </header>
  <main class="layout">
    <section class="panel">
      <h1>独立策略模型</h1>
      <div class="grid">
        <div class="controls" id="strategyList"></div>
        <div class="panel">
          <h2>模型参数</h2>
          <div class="toolbar">
            <label>近期开奖 <input class="small-input" id="windowSize" type="number" min="10" max="50" value="30"></label>
            <label>候选倍数 <input class="small-input" id="candidateFactor" type="number" min="1" max="4" value="2"></label>
            <button class="button primary" id="runButton" type="button">计算</button>
            <button class="button" id="saveButton" type="button">保存到自选</button>
          </div>
          <p class="note">策略库只做独立模型试算，不修改分析走势图。保存后会写入同一个预测记录，供预测区和回测区读取。</p>
        </div>
      </div>
    </section>
    <section class="panel result">
      <h2>推荐结果</h2>
      <div class="pick" id="resultPick"></div>
      <div class="score-grid" id="scoreGrid"></div>
    </section>
  </main>
  <script src="../data/chart-data.js"></script>
  <script src="./core/ssq-core.js"></script>
  <script>
    (() => {
      const { normalizePicks, readRecord, writeRecord } = window.SSQCore;
      const rows = window.SSQ_CHART_DATA?.rows || [];
      const strategies = [
        { id: "frequency", title: "频率均衡", text: "参考近期开奖出现次数，避免完全追冷或完全追热。", example: "示例：近30期出现频率居中的红球保留基础权重。", defaultOn: true },
        { id: "miss", title: "遗漏修正", text: "给长时间未出的号码加权，但限制极端遗漏。", example: "示例：某红球连续遗漏12期以内时适度加分。", defaultOn: true },
        { id: "zone", title: "分区覆盖", text: "红球低中高区尽量分布，减少过度集中。", example: "示例：01-11、12-22、23-33 三段尽量都有覆盖。", defaultOn: true },
        { id: "parity", title: "奇偶约束", text: "控制奇偶比例接近历史常见结构。", example: "示例：避免 6 个红球全部奇数或全部偶数。", defaultOn: true },
        { id: "adjacent", title: "连邻号提醒", text: "适度奖励与最新开奖号相邻的号码。", example: "示例：上期出现 18，本期 17 或 19 得到轻微加权。", defaultOn: false }
      ];
      let result = { red: [], blue: [] };
      const selectedStrategies = new Set(strategies.filter((item) => item.defaultOn).map((item) => item.id));
      const strategyList = document.getElementById("strategyList");
      const resultPick = document.getElementById("resultPick");
      const scoreGrid = document.getElementById("scoreGrid");
      const ball = (n, color) => `<span class="ball ${color}">${String(n).padStart(2, "0")}</span>`;
      const renderStrategies = () => {
        strategyList.innerHTML = strategies.map((item) => `<button class="strategy ${selectedStrategies.has(item.id) ? "selected" : ""}" type="button" data-strategy="${item.id}" title="${item.text}
${item.example}"><h3>${item.title}</h3></button>`).join("");
      };
      const active = () => new Set(selectedStrategies);
      const stats = (max, key, windowSize) => {
        const sample = rows.slice(-windowSize);
        const count = Array(max + 1).fill(0);
        const miss = Array(max + 1).fill(0);
        sample.forEach((row) => {
          const set = new Set(key === "red" ? row.red.map(Number) : [Number(row.blue)]);
          for (let n = 1; n <= max; n += 1) {
            if (set.has(n)) { count[n] += 1; miss[n] = 0; }
            else miss[n] += 1;
          }
        });
        return { sample, count, miss };
      };
      const scoreNumber = (n, max, key, data, chosen) => {
        const enabled = active();
        let score = 10;
        if (enabled.has("frequency")) score += data.count[n] * 2.4;
        if (enabled.has("miss")) score += Math.min(data.miss[n], 12) * 1.1;
        if (enabled.has("adjacent") && data.sample.length) {
          const latest = data.sample.at(-1);
          const latestNumbers = key === "red" ? latest.red.map(Number) : [Number(latest.blue)];
          if (latestNumbers.some((item) => Math.abs(item - n) === 1)) score += 6;
        }
        if (key === "red" && enabled.has("zone") && chosen.length) {
          const zone = Math.ceil(n / 11);
          const zoneCount = chosen.filter((item) => Math.ceil(item / 11) === zone).length;
          score -= zoneCount * 5;
        }
        if (key === "red" && enabled.has("parity") && chosen.length) {
          const sameParity = chosen.filter((item) => item % 2 === n % 2).length;
          score -= Math.max(0, sameParity - 2) * 4;
        }
        return Math.max(1, score);
      };
      const choose = (max, take, key, data) => {
        const picked = [];
        const factor = Math.max(1, Number(document.getElementById("candidateFactor").value) || 2);
        while (picked.length < take) {
          const scored = Array.from({ length: max }, (_, index) => index + 1)
            .filter((n) => !picked.includes(n))
            .map((n) => ({ n, score: scoreNumber(n, max, key, data, picked) }))
            .sort((a, b) => b.score - a.score);
          const candidateCount = Math.min(scored.length, Math.max(take, Math.round(take * factor)));
          const winner = scored.slice(0, candidateCount)[Math.floor(Math.random() * candidateCount)];
          picked.push(winner.n);
        }
        return picked.sort((a, b) => a - b);
      };
      const renderScores = (title, numbers, max, key, data) => {
        const top = Array.from({ length: max }, (_, index) => index + 1)
          .map((n) => ({ n, score: scoreNumber(n, max, key, data, []) }))
          .sort((a, b) => b.score - a.score)
          .slice(0, 12);
        const highest = top[0]?.score || 1;
        return `<div class="score-list"><h3>${title}</h3>${top.map((item) => `<div class="score-line"><span>${String(item.n).padStart(2, "0")}</span><span class="bar"><span class="fill" style="width:${Math.round(item.score / highest * 100)}%"></span></span><span>${item.score.toFixed(1)}</span></div>`).join("")}</div>`;
      };
      const run = () => {
        const windowSize = Math.min(Math.max(Number(document.getElementById("windowSize").value) || 30, 10), rows.length || 10);
        const redStats = stats(33, "red", windowSize);
        const blueStats = stats(16, "blue", windowSize);
        result = { red: choose(33, 6, "red", redStats), blue: choose(16, 1, "blue", blueStats) };
        resultPick.innerHTML = result.red.map((n) => ball(n, "red")).join("") + result.blue.map((n) => ball(n, "blue")).join("");
        scoreGrid.innerHTML = renderScores("红球评分前列", result.red, 33, "red", redStats) + renderScores("蓝球评分前列", result.blue, 16, "blue", blueStats);
      };
      const save = () => {
        if (!result.red.length) run();
        const payload = readRecord();
        const picks = normalizePicks(payload.picks);
        picks[1] = result;
        writeRecord({ picks: normalizePicks(picks) });
      };
      renderStrategies();
      strategyList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-strategy]");
        if (!button) return;
        const id = button.dataset.strategy;
        if (selectedStrategies.has(id)) selectedStrategies.delete(id);
        else selectedStrategies.add(id);
        renderStrategies();
        run();
      });
      document.getElementById("runButton").addEventListener("click", run);
      document.getElementById("saveButton").addEventListener("click", save);
      run();
    })();
  </script>
</body>
</html>
